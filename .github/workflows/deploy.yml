name: Deploy cortex-dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/c3jota/cortex-dashboard
          git pull origin main

      - name: Install dependencies
        run: cd /home/c3jota/cortex-dashboard && npm ci

      - name: Build
        run: cd /home/c3jota/cortex-dashboard && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Copy static assets to standalone
        run: |
          cp -r /home/c3jota/cortex-dashboard/.next/static /home/c3jota/cortex-dashboard/.next/standalone/.next/static
          cp -r /home/c3jota/cortex-dashboard/public /home/c3jota/cortex-dashboard/.next/standalone/public 2>/dev/null || true

      - name: Restart service
        run: sudo systemctl restart cortex-dashboard
